<div class="popup" id="getPopupFizFace">
  <div class="popup__content">
    <div class="popup__body">
      <button class="popup__close" type="button"></button>

      <div class="popup__header">
        <div class="popup__icon">
          <img src="assets/img/dashboard/icons/popup-fizface.svg" alt="" />
        </div>
        <div class="popup__title">Физическое лицо</div>
      </div>

      <div class="popup__form form">
        <form action="" method="post">
          <div class="form__item">
            <input name="surname" type="text" placeholder="Фамилия*" required />
          </div>

          <div class="form__item">
            <input name="firstname" type="text" placeholder="Имя*" required />
          </div>

          <div class="form__item patronymic-item">
            <input name="patronymic" type="text" placeholder="Отчество*" required />
          </div>

          <div class="form__item checkbox">
            <label for="no-patronymic" class="checkbox__label">
              <input
                type="checkbox"
                id="no-patronymic"
                name="no_patronymic"
                value="1"
                class="checkbox-no-patronymic"
              />
              <span class="checkbox-text">У меня нет отчества</span>
            </label>
          </div>

          <div class="form__row">
            <div class="form__item">
              <div class="suggest" data-suggest="day">
                <input type="text" class="suggest__input" placeholder="День*" autocomplete="off" />
                <input type="hidden" name="day" />
                <div class="suggest__dropdown"></div>
              </div>
            </div>
            <div class="form__item">
              <div class="suggest" data-suggest="month">
                <input type="text" class="suggest__input" placeholder="Месяц*" autocomplete="off" />
                <input type="hidden" name="month" />
                <div class="suggest__dropdown"></div>
              </div>
            </div>
            <div class="form__item">
              <div class="suggest" data-suggest="year">
                <input type="text" class="suggest__input" placeholder="Год*" autocomplete="off" />
                <input type="hidden" name="year" />
                <div class="suggest__dropdown"></div>
              </div>
            </div>
          </div>

          <div class="form__item">
            <div class="suggest" data-suggest="region">
              <input type="text" class="suggest__input" placeholder="Регион*" autocomplete="off" />
              <input type="hidden" name="region" />
              <div class="suggest__dropdown"></div>
            </div>
          </div>

          <div class="form__item checkbox">
            <label for="fiz-policy" class="checkbox__label">
              <input type="checkbox" id="fiz-policy" name="policy" value="1" required />
              <span class="checkbox-text">
                Я даю <b>Согласие</b> на обработку моих персональных данных в соответствии
                <a href="#">с Политикой конфиденциальности</a> и ознакомлен
                <a href="#">с Правилами работы сервиса</a>
              </span>
            </label>
          </div>

          <div class="form__row form__footer">
            <button class="btn-gray" type="reset" data-close>Отмена</button>
            <button class="btn" type="submit">Сохранить</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
