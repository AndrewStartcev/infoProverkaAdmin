<div class="popup" id="getCallPopup">
  <div class="popup__content">
    <div class="popup__body">
      <button class="popup__close" type="button"></button>

      <div class="popup__title">Мы вам перезвоним!</div>
      <div class="popup__text">
        Нужна консультация? Оставьте свой контакт, мы с вами свяжемся и ответим на вопросы!
      </div>

      <div class="popup__form form">
        <form action="" method="post">
          <div class="form-item">
            <input
              id="callback-name"
              name="name"
              type="text"
              placeholder="Ваше имя"
              autocomplete="name"
            />
          </div>

          <div class="form-item">
            <input
              id="callback-phone"
              name="phone"
              type="tel"
              placeholder="Ваш телефон*"
              autocomplete="tel"
              required
            />
          </div>

          <div class="form-item checkbox">
            <label for="callback-policy" class="checkbox-label">
              <input type="checkbox" id="callback-policy" name="policy" value="1" required />
              <span class="checkbox-text">
                Оставляя заявку вы даёте
                <a href="#">согласие на обработку персональных данных</a>
              </span>
            </label>
          </div>

          <button class="btn" type="submit">Отправить</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="popup" id="formSuccess">
  <div class="popup__content">
    <div class="popup__body _center">
      <button class="popup__close"></button>
      <div class="popup__icon">
        <svg
          width="60"
          height="60"
          viewBox="0 0 60 60"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect width="60" height="60" rx="30" fill="#C77F15" />
          <path
            d="M42.2222 21.1111L25.9259 38.8889L17.7777 30"
            stroke="white"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
      <div class="popup__title">Спасибо за заявку</div>
      <div class="popup__text">В скором времени мы свяжемся с вами</div>
    </div>
  </div>
</div>
