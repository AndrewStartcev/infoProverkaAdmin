<!doctype html>
<html lang="Ru-ru">
  @@include("chunk/head.html", {"title": "Платформа для сбора и анализа данных",})

  <body>
    <div class="page">
      @@include("chunk/header.html")

      <main class="main">
        <section class="not-page">
          <div class="page__container">
            <div class="popup__body show">
              <div class="popup__header">
                <div class="popup__icon">
                  <img src="assets/img/dashboard/icons/auth.svg" alt="" />
                </div>
                <div class="popup__title">Авторизация</div>
              </div>

              <div class="popup__form form">
                <form action="" method="post">
                  <div class="form__item">
                    <input name="surname" type="tel" placeholder="Номер телефона*" required />
                  </div>
                  <div class="form__item">
                    <input name="surname" type="password" placeholder="Пароль" required />
                  </div>
                  <div class="form__row nowrap">
                    <div class="form__item checkbox">
                      <label for="fiz-policy" class="checkbox__label">
                        <input type="checkbox" id="fiz-policy" name="policy" value="1" required />
                        <span class="checkbox-text"> Запомнить меня </span>
                      </label>
                    </div>
                    <a href="reset_password.html" class="password">Забыли пароль?</a>
                  </div>

                  <button class="btn w-100" type="submit">Войти</button>
                </form>
                <div class="form__footer">
                  <span>
                    Вы впервые на сайте? <br />
                    <a href="registration.html">Зарегистрироваться сейчас</a></span
                  >
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      @@include("chunk/footer.html")
      <!--  -->
      @@include("chunk/popup.html")
    </div>
    @@include("chunk/script.html")
  </body>
</html>
